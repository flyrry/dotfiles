# don't allow programs to rename windows
set-option -g allow-rename off

# rename windows automatically
set-option -g automatic-rename-format '#{b:pane_current_path}'
set-option -g automatic-rename on

# enable mouse mode
set -g mouse on
# enable auto-saving (every 15min) and auto-loading (on startup) of tmux layout
# set -g @continuum-restore 'on'

# remap prefix from 'C-b' to '§'
unbind C-b
set-option -g prefix §
bind-key § send-prefix

# source config for tmuxline
if-shell "test -f ~/.tmux/tmuxline.snapshot.conf" "source ~/.tmux/tmuxline.snapshot.conf"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

#set -g @plugin 'tmux-plugins/tmux-cpu'
#set -g @cpu_low_bg_color "#[bg=transparent]"
#set -g status-right '#{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} | %a %h-%d %H:%M '

#set -g @plugin 'samoshkin/tmux-plugin-sysstat'
#set -g status-right "#{sysstat_cpu} | #{sysstat_mem} | #{sysstat_loadavg}"

set -g status-right '%a %h-%d %H:%M '

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.config/tmux/plugins/tpm/tpm'

# true color support
set -g default-terminal "tmux-256color"
#set-option -ga terminal-overrides ",xterm-kitty:Tc"
set-option -a terminal-overrides ",*256col*:RGB"

source-file ~/.config/tmux/tokyonight_storm.tmux
